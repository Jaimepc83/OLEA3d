<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Toki - OLEA3D Retro Hub</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100vw;
            height: 100vh;
            background-color: #000;
            overflow: hidden;
            font-family: Arial, sans-serif;
            touch-action: none;
        }

        .boton-volver {
            position: absolute;
            top: 15px;
            left: 15px;
            background-color: rgba(0, 0, 0, 0.7);
            color: #ffffff;
            border: 2px solid #ffffff;
            border-radius: 8px;
            padding: 8px 16px;
            text-decoration: none;
            font-weight: bold;
            z-index: 9999;
            font-size: 14px;
            text-transform: uppercase;
            box-shadow: 0 4px 6px rgba(0,0,0,0.5);
        }

        #game-container {
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        #game {
            width: 100%;
            height: 100%;
        }
    </style>
</head>
<body>

    <a href="index.html" class="boton-volver">⬅ Volver al Hub</a>

    <div id="game-container">
        <div id="game"></div>
    </div>

    <script>
        EJS_player = '#game';
        EJS_core = 'segaMD'; 
        EJS_gameName = 'Toki'; 
        EJS_color = '#e00000'; 
        EJS_startOnLoaded = true; 
        EJS_pathtodata = 'https://cdn.emulatorjs.org/stable/data/'; 
        EJS_gameUrl = 'tokimg.bin'; 
    </script>
    <script src="https://cdn.emulatorjs.org/stable/data/loader.js"></script>

</body>
</html>
