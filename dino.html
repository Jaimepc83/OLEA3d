<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Cadillacs and Dinosaurs - OLEA3D</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: Arial, sans-serif; overscroll-behavior: none; }
        #game-container { position: absolute; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; }
        
        /* --- HUD FLOTANTE MINIMALISTA (SIN BARRA NEGRA) --- */
        #olea-hud {
            position: fixed; top: -60px; left: 0; width: 100%; 
            /* Quitamos el fondo sólido y solo centramos los botones */
            display: flex; justify-content: center; align-items: flex-start; gap: 8px;
            z-index: 2147483647; 
            transition: top 0.4s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            padding-top: max(10px, env(safe-area-inset-top)); 
            pointer-events: none; /* Deja pasar los toques donde no hay botón */
        }
        
        #olea-hud.visible { top: 0; }

        /* Botones estilo píldora pequeña y translúcida */
        .btn-olea {
            pointer-events: auto; /* Activa el toque solo en los botones */
            padding: 6px 12px;
            border-radius: 20px;
            font-family: Arial, sans-serif;
            font-size: 10px; font-weight: bold;
            text-transform: uppercase; cursor: pointer;
            border: 1px solid rgba(255,255,255,0.4); 
            color: white;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.8);
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            backdrop-filter: blur(5px); /* Efecto cristal */
            transition: transform 0.1s;
        }
        
        .btn-exit { background: rgba(139, 0, 0, 0.8); text-decoration: none; display: flex; align-items: center; }
        .btn-save { background: rgba(0, 91, 159, 0.8); }
        .btn-load { background: rgba(107, 142, 35, 0.8); }
        .btn-olea:active { transform: scale(0.9); }

        /* --- TOAST FLOTANTE MÁS DISCRETO --- */
        #save-toast { 
            position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); 
            background: rgba(15,15,15,0.85); border: 1px solid #9dff3d; 
            color: #9dff3d; padding: 8px 16px; border-radius: 20px; 
            font-weight: bold; font-size: 11px; opacity: 0; 
            pointer-events: none; transition: 0.3s; z-index: 2147483647; text-align: center; 
            backdrop-filter: blur(4px);
        }
        #save-toast.show { opacity: 1; transform: translateX(-50%) translateY(-10px); }
    </style>
</head>
<body>
    <div id="game-container"><div id="game"></div></div>
    
    <div id="olea-hud">
        <a href="index.html" class="btn-olea btn-exit">⬅ SALIR</a>
        <button class="btn-olea btn-save" onclick="oleaSave()">💾 GUARDAR</button>
        <button class="btn-olea btn-load" onclick="oleaLoad()">📂 CARGAR</button>
    </div>

    <div id="save-toast">✅ Acción completada</div>

    <script>
        // --- 1. Lógica para bajar el Menú ---
        const hud = document.getElementById('olea-hud'); 
        let temporizadorHUD;
        
        function mostrarHUD() { 
            hud.classList.add('visible'); 
            clearTimeout(temporizadorHUD); 
            // Tiempo reducido: se esconde a los 3 segundos para no molestar
            temporizadorHUD = setTimeout(() => { hud.classList.remove('visible'); }, 3000); 
        }
        
        window.addEventListener('touchstart', mostrarHUD);
        window.addEventListener('mousemove', mostrarHUD);

        // --- INYECCIÓN EN FULL SCREEN ---
        document.addEventListener('fullscreenchange', () => {
            const toast = document.getElementById('save-toast');
            if (document.fullscreenElement) {
                try { 
                    document.fullscreenElement.appendChild(hud); 
                    document.fullscreenElement.appendChild(toast); 
                } catch(e){}
            } else {
                document.body.appendChild(hud);
                document.body.appendChild(toast);
            }
        });

        // --- 2. Lógica de Guardado ---
        function oleaSave() {
            try {
                if (window.EJS_emulator && window.EJS_emulator.gameManager) {
                    EJS_emulator.gameManager.quickSave(1); 
                    mostrarToast('💾 Partida guardada');
                } else { mostrarToast('❌ Espera a que cargue...'); }
            } catch(e) { console.error(e); }
        }

        function oleaLoad() {
            try {
                if (window.EJS_emulator && window.EJS_emulator.gameManager) {
                    EJS_emulator.gameManager.quickLoad(1); 
                    mostrarToast('📂 Partida cargada');
                } else { mostrarToast('❌ Espera a que cargue...'); }
            } catch(e) { console.error(e); }
        }

        function mostrarToast(msg) {
            const toast = document.getElementById('save-toast');
            toast.innerText = msg;
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 2000);
        }

        // --- 3. Configuración del Emulador ---
        EJS_player = '#game';
        EJS_core = 'arcade'; 
        EJS_gameName = 'Cadillacs and Dinosaurs';
        EJS_gameUrl = 'dino.zip'; 
        EJS_color = '#d4af37';
        EJS_startOnLoaded = true;
        EJS_pathtodata = 'https://cdn.jsdelivr.net/gh/ethanaobrien/emulatorjs@main/data/';
    </script>
    <script src="https://cdn.jsdelivr.net/gh/ethanaobrien/emulatorjs@main/data/loader.js"></script>
</body>
</html>
