<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pac-Man Arcade - OLEA3D</title>
<style>
body {
margin: 0;
background: #0d0d0d;
color: white;
font-family: Arial, sans-serif;
text-align: center;
display: flex;
flex-direction: column;
justify-content: center;
align-items: center;
height: 100vh;
}

.header {
position: absolute;
top: 0;
width: 100%;
padding: 15px;
background: #111;
border-bottom: 3px solid #ff00ff;
box-sizing: border-box;
}
.btn-volver {
display: inline-block;
padding: 10px 20px;
background: #111;
color: #ff00ff;
text-decoration: none;
border-radius: 8px;
font-weight: bold;
border: 2px solid #ff00ff;
}
.btn-jugar {

display: inline-block;
padding: 20px 40px;
background: #ff00ff;
color: white;
font-size: 24px;
font-weight: bold;
text-decoration: none;
border-radius: 15px;
box-shadow: 0 0 30px rgba(255,0,255,0.6);
margin-top: 20px;
transition: 0.3s;
animation: latido 1.5s infinite;
}
@keyframes latido {
0% { transform: scale(1); }
50% { transform: scale(1.05); }
100% { transform: scale(1); }
}
img.fantasma {
width: 150px;

margin-bottom: 20px;
}
</style>
</head>
<body>

<div class="header">
<a href="index.html" class="btn-volver">⬅ VOLVER AL MENÚ</a>
</div>

<img src="https://upload.wikimedia.org/wikipedia/en/5/59/Pac-man.png" class="fantasma" alt="Pac-Man Logo">

<h2 style="color: #ff00ff;">EL CLÁSICO ESTÁ LISTO</h2>
<p style="color: #aaa; margin-bottom: 30px;">Pulsa el botón para abrir el arcade a pantalla completa.</p>


<a href="https://pacman.platzh1rsch.ch/" class="btn-jugar" target="_blank">🕹️ INICIAR ARCADE</a>

</body>
</html>
