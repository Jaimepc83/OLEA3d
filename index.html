<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OLEA3D Retro Hub</title>
<style>
/* ... (Mantén los mismos estilos anteriores del CSS) ... */

/* ESTILOS SALÓN DE LA FAMA */
.salon-fama { background: #000; border: 2px solid #ffd700; padding: 20px; border-radius: 10px; margin-top: 20px; }
.tabla-records { width: 100%; border-collapse: collapse; color: #fff; font-family: 'Courier New', monospace; }
.tabla-records th { color: #ffd700; border-bottom: 2px solid #ffd700; padding: 10px; }
.tabla-records td { padding: 8px; text-align: center; border-bottom: 1px solid #333; }
.btn-anadir { background: #ffd700; color: #000; border: none; padding: 10px; width: 100%; border-radius: 5px; font-weight: bold; cursor: pointer; margin-top: 10px; }
</style>
</head>
<body>

<div id="modalFicha" class="modal-ficha">
    <div class="ficha-content">
        <button class="close-ficha" onclick="cerrarFicha();">❌</button>
        <div class="ficha-header">
            <img id="fichaImg" src="">
            <div class="ficha-titulos">
                <h2 id="fichaTitulo"></h2>
                <div id="fichaValoracion" class="valoracion-box"></div>
            </div>
        </div>
        
        <div class="tabs">
            <button class="tab-btn active" onclick="cambiarPestana('historia');">📖 HISTORIA</button>
            <button class="tab-btn" onclick="cambiarPestana('fama');">🏆 SALÓN FAMA</button>
        </div>

        <div id="contenidoHistoria" class="texto-panel"></div>
        
        <div id="contenidoFama" class="salon-fama" style="display:none;">
            <table class="tabla-records" id="tablaRecords">
                <thead><tr><th>POS</th><th>NOMBRE</th><th>PUNTOS</th></tr></thead>
                <tbody id="bodyRecords"></tbody>
            </table>
            <button class="btn-anadir" onclick="anadirRecord()">➕ AÑADIR RÉCORD</button>
        </div>

        <button id="btnIniciarJuego" class="btn-jugar-modal" onclick="irAlJuego();">🚀 EMPEZAR PARTIDA</button>
    </div>
</div>

<script>
// --- LÓGICA DE SALÓN DE LA FAMA ---
let juegoActual = "";

function cambiarPestana(pestana) {
    document.getElementById("contenidoHistoria").style.display = (pestana === 'historia') ? "block" : "none";
    document.getElementById("contenidoFama").style.display = (pestana === 'fama') ? "block" : "none";
    if(pestana === 'fama') renderizarRecords();
}

function anadirRecord() {
    let nombre = prompt("Introduce tus 3 iniciales:", "AAA").toUpperCase().substring(0, 3);
    let puntos = prompt("Introduce tu puntuación:", "0");
    if (nombre && puntos) {
        let records = JSON.parse(localStorage.getItem('records_' + juegoActual) || "[]");
        records.push({nombre, puntos: parseInt(puntos)});
        records.sort((a, b) => b.puntos - a.puntos);
        records = records.slice(0, 5); // Guardamos solo top 5
        localStorage.setItem('records_' + juegoActual, JSON.stringify(records));
        renderizarRecords();
    }
}

function renderizarRecords() {
    let records = JSON.parse(localStorage.getItem('records_' + juegoActual) || "[]");
    let body = document.getElementById("bodyRecords");
    body.innerHTML = records.map((r, i) => `<tr><td>${i+1}</td><td>${r.nombre}</td><td>${r.puntos}</td></tr>`).join('');
}

function verFicha(idJuego) {
    juegoActual = idJuego;
    // ... (El resto de la lógica de carga de datos que ya teníamos)
    document.getElementById("modalFicha").style.display = "flex";
    cambiarPestana('historia');
}

// --- FUNCIÓN PANTALLA COMPLETA ELIMINADA ---
// Ya no existe el trigger que forzaba el fullscreen.
</script>
</body>
</html>
