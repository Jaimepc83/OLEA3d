<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Sunset Riders - OLEA3D</title>
    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background-color: #000; overflow: hidden; font-family: Arial, sans-serif; overscroll-behavior: none; }
        #game-container { position: absolute; top: 0; left: 0; right: 0; bottom: 0; width: 100%; height: 100%; }
        #btn-volver { position: absolute; top: 15px; left: 15px; background: rgba(0, 0, 0, 0.8); color: #d4af37; text-decoration: none; padding: 8px 12px; font-weight: bold; border: 1px solid #d4af37; border-radius: 8px; z-index: 10000; font-size: 11px; transition: opacity 0.4s ease; opacity: 0; pointer-events: none; text-transform: uppercase; }
        #btn-volver.visible { opacity: 1; pointer-events: auto; }
    </style>
</head>
<body>
    <a href="index.html" id="btn-volver">⬅ SALIR</a>
    <div id="game-container"><div id="game"></div></div>
    <script>
        const btnVolver = document.getElementById('btn-volver'); let temporizador;
        function mostrarBoton() { btnVolver.classList.add('visible'); clearTimeout(temporizador); temporizador = setTimeout(() => { btnVolver.classList.remove('visible'); }, 3000); }
        window.addEventListener('touchstart', function(e) { if (e.touches[0].clientY < window.innerHeight * 0.15) { mostrarBoton(); } });
        window.addEventListener('mousemove', function(e) { if (e.clientY < window.innerHeight * 0.15) { mostrarBoton(); } });

        EJS_player = '#game';
        EJS_core = 'snes'; 
        EJS_gameName = 'Sunset Riders';
        EJS_gameUrl = 'sunsetrider.sfc'; 
        EJS_color = '#d4af37';
        EJS_startOnLoaded = true;
        EJS_pathtodata = 'https://cdn.jsdelivr.net/gh/ethanaobrien/emulatorjs@main/data/';
    </script>
    <script src="https://cdn.jsdelivr.net/gh/ethanaobrien/emulatorjs@main/data/loader.js"></script>
</body>
</html>
